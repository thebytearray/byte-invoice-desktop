name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 1.0.0 or v1.0.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_name: byte-invoice-macos-arm64
            is_android: false
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact_name: byte-invoice-macos-x64
            is_android: false
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: byte-invoice-windows-x64
            is_android: false
          - platform: ubuntu-latest
            target: android
            artifact_name: byte-invoice-android
            is_android: true

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.is_android && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || matrix.target }}

      - name: Ensure Rust target is installed
        if: matrix.is_android == false
        run: rustup target add ${{ matrix.target }}

      - name: Setup Java
        if: matrix.is_android
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        if: matrix.is_android
        uses: android-actions/setup-android@v3
        with:
          packages: tools platform-tools ndk;26.1.10909125

      - name: Create debug keystore for Android signing
        if: matrix.is_android
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri (macOS - app bundle + DMG)
        if: matrix.is_android == false && matrix.platform == 'macos-latest'
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles app,dmg

      - name: Build Tauri (Windows - NSIS exe)
        if: matrix.is_android == false && matrix.platform == 'windows-latest'
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles nsis

      - name: Create macOS zip and prepare DMG
        if: matrix.is_android == false && matrix.platform == 'macos-latest'
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          ARCH=${{ matrix.target == 'aarch64-apple-darwin' && 'arm64' || 'x64' }}
          cd src-tauri/target/${{ matrix.target }}/release/bundle/macos
          zip -r "../../../../../../Byte-Invoice-${VERSION}-macos-${ARCH}.zip" "Byte Invoice.app"
          cd ..
          if [ -d dmg ] && ls dmg/*.dmg 1>/dev/null 2>&1; then
            cp dmg/*.dmg "../../../../../Byte-Invoice-${VERSION}-macos-${ARCH}.dmg"
          fi

      - name: Upload macOS artifacts
        if: matrix.is_android == false && matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            Byte-Invoice-*-macos-${{ matrix.target == 'aarch64-apple-darwin' && 'arm64' || 'x64' }}.zip
            Byte-Invoice-*-macos-${{ matrix.target == 'aarch64-apple-darwin' && 'arm64' || 'x64' }}.dmg

      - name: Upload Windows exe
        if: matrix.is_android == false && matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Build Tauri (Android)
        if: matrix.is_android
        run: npm run tauri android build -- --ci

      - name: Prepare Android artifacts (unique names to avoid release conflicts)
        if: matrix.is_android
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          APK_DIR="src-tauri/gen/android/app/build/outputs/apk"
          mkdir -p android-artifacts
          for apk in "$APK_DIR"/universal/release/*.apk; do
            [ -f "$apk" ] && cp "$apk" "android-artifacts/Byte-Invoice-${VERSION}-android-universal.apk" && break
          done
          for subdir in "$APK_DIR"/*/; do
            [ -d "$subdir" ] || continue
            variant=$(basename "$subdir")
            [ "$variant" = "universal" ] && continue
            for apk in "$subdir"release/*.apk; do
              [ -f "$apk" ] && cp "$apk" "android-artifacts/Byte-Invoice-${VERSION}-android-${variant}.apk" && break
            done
          done

      - name: Upload Android artifacts
        if: matrix.is_android
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: android-artifacts/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate version input
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "::error::Version input is required. Trigger the workflow manually and provide a version (e.g. v1.0.2)."
            echo "::error::Re-running failed jobs may lose workflow_dispatch inputs - use 'Re-run all jobs' or trigger a fresh run."
            exit 1
          fi
          # Ensure tag has 'v' prefix for consistency
          if [[ ! "$VERSION" =~ ^v ]]; then
            echo "TAG_NAME=v$VERSION" >> $GITHUB_ENV
          else
            echo "TAG_NAME=$VERSION" >> $GITHUB_ENV
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: byte-invoice-*
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Byte Invoice ${{ env.TAG_NAME }}
          draft: false
          generate_release_notes: true
          files: |
            byte-invoice-macos-arm64/**/*
            byte-invoice-macos-x64/**/*
            byte-invoice-windows-x64/**/*
            byte-invoice-android/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
