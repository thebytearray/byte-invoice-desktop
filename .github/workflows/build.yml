name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 1.0.0 or v1.0.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_name: byte-invoice-macos-arm64
            is_android: false
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact_name: byte-invoice-macos-x64
            is_android: false
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: byte-invoice-windows-x64
            is_android: false
          - platform: ubuntu-latest
            target: android
            artifact_name: byte-invoice-android
            is_android: true

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.is_android && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || matrix.target }}

      - name: Ensure Rust target is installed
        if: matrix.is_android == false
        run: rustup target add ${{ matrix.target }}

      - name: Setup Java
        if: matrix.is_android
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        if: matrix.is_android
        uses: android-actions/setup-android@v3
        with:
          packages: tools platform-tools ndk;26.1.10909125

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri (desktop)
        if: matrix.is_android == false
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Build Tauri (Android)
        if: matrix.is_android
        run: npm run tauri android build

      - name: Upload desktop artifacts
        if: matrix.is_android == false
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/

      - name: Upload Android artifacts
        if: matrix.is_android
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/gen/android/app/build/outputs/apk/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: byte-invoice-*
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Byte Invoice ${{ github.event.inputs.version }}
          draft: false
          generate_release_notes: true
          files: |
            byte-invoice-macos-arm64/**/*
            byte-invoice-macos-x64/**/*
            byte-invoice-windows-x64/**/*
            byte-invoice-android/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
