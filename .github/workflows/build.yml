name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 1.0.0 or v1.0.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_name: byte-invoice-macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact_name: byte-invoice-macos-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: byte-invoice-windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@1.77
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: byte-invoice-*
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Byte Invoice ${{ github.event.inputs.version }}
          draft: false
          generate_release_notes: true
          files: |
            byte-invoice-macos-arm64/**/*
            byte-invoice-macos-x64/**/*
            byte-invoice-windows-x64/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
